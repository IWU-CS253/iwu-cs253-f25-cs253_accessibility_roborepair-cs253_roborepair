<html lang="en"> <!-- I added the lang="en" so accessability users know what language to read it in-->

<head>
    <title>Contact - RoboCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
	    <img src="images/banner.png" width="65%" alt="RoboCare Banner"> <!-- I changed the width to be 65% to be more visible -->
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li> <!--my recommendation is to delete all the lines under the words, 
                                                       and change the color to not be grey. Doing this makes it hard for the vision impaired-->
                <li><a href="services.html">Our Catalog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
	
    <h1>Contact Us</h1>
    <p>For any questions, please fill out the form below:</p>

    <form>
        Name: <input type="text" name="name"><br>
        Email: <input type="text" name="email"><br>
        Message: <textarea name="message"></textarea><br>
        <input type="submit" value="Send" style="background-color: rgb(64, 64, 64); color: white;"> <!-- I changed the color of the sqaure to be more visiable-->
    </form>

    <div>
        <h2>Visit Us:</h2><!--recommend that the color contrast should be more prevelant-->
        <p>RoboCare Inc.</p><!--recommend that the color contrast should be more prevelant-->
        <p style="color: #000000;">123 Robot Lane, Tech City</p> <!--I changed the color to have more contrast for the vision impaired-->
    </div>

    <button onclick="document.location='index.html'">Back to Homepage</button>
    <footer>
        <p><img src="images/unscrupulous.png" width="100px">© 2024 Unscrupulous Web Design</p> <!--image was too small to see, changed it to 100px for the visually impaired.
                                                                                                not only that you need change the color of the copyright-->
    </footer>
</body>
</html>
